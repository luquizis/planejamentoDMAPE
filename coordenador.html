<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEGAPE — Coordenação</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1B3A6B;--azm:#2E5CA8;--azc:#5B8DD9;--verde:#1D7A55;--dou:#C8922A;--douc:#E8B84B;--ce:#2C2C2C;--cz:#5F5F5F;--cl:#F4F3EF;--br:#FAFAF8;--bd:rgba(0,0,0,0.09)}
body{font-family:'DM Sans',sans-serif;background:var(--cl);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--azm);padding:.9rem 2rem;display:flex;align-items:center;gap:.75rem}
.sigla{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--douc)}
.sep{width:1px;height:28px;background:rgba(255,255,255,.2);margin:0 .5rem}
.subt{font-size:.68rem;color:rgba(255,255,255,.5)}
.nav-back{font-size:.72rem;color:rgba(255,255,255,.55);text-decoration:none}
select.sel{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:.78rem;padding:.32rem .6rem;border-radius:6px;cursor:pointer}
select.sel option{background:var(--azm)}
.btn-h{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:.72rem;padding:.3rem .65rem;border-radius:6px;cursor:pointer}
main{flex:1;padding:1.25rem 2rem;max-width:1400px;margin:0 auto;width:100%}
.kcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem;margin-bottom:1.25rem}
.kc{background:var(--br);border:1px solid var(--bd);border-radius:10px;padding:.8rem .9rem}
.kc-n{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;color:var(--azul)}
.kc-l{font-size:.67rem;color:var(--cz);text-transform:uppercase;margin-top:2px}
.kc.alert .kc-n{color:var(--dou)}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:1.25rem}
.tab{padding:.55rem 1.1rem;font-size:.8rem;font-weight:500;color:var(--cz);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--azm);border-color:var(--azm);font-weight:600}
table.t{width:100%;border-collapse:collapse;background:var(--br);border-radius:10px;overflow:hidden;border:1px solid var(--bd);font-size:.79rem;margin-bottom:1.25rem}
table.t th{background:#F0F2F6;padding:.5rem .75rem;text-align:left;font-size:.67rem;font-weight:600;color:var(--cz);text-transform:uppercase;border-bottom:1px solid var(--bd)}
table.t td{padding:.6rem .75rem;border-bottom:1px solid var(--bd);vertical-align:middle}
table.t tr:last-child td{border-bottom:none}
table.t tr:hover td{background:#F8F8F6}
.pbar{width:65px;height:7px;background:#E5E5E0;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:3px}
.pfill{height:100%;border-radius:4px;background:var(--azm)}
.btn{padding:.35rem .8rem;border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;border:none}
.btn-ok{background:#E0F5ED;color:var(--verde);border:1px solid #1D7A5540}
.btn-no{background:#FFF0EC;color:#B34A2A;border:1px solid #B34A2A40}
.empty{text-align:center;padding:2rem;color:var(--cz);font-size:.82rem;background:var(--br);border:1px solid var(--bd);border-radius:10px;margin-bottom:1rem}
.gantt-wrap{background:var(--br);border:1px solid var(--bd);border-radius:10px;overflow:auto}
.gh-row{display:grid;grid-template-columns:240px 70px 1fr;border-bottom:1px solid var(--bd)}
.gc-lbl{padding:.4rem .6rem;font-size:.65rem;font-weight:600;color:var(--cz);text-transform:uppercase}
.gm-hdr{display:grid;grid-template-columns:repeat(12,1fr)}
.gm-lbl{font-size:.6rem;color:var(--cz);text-align:center;padding:.35rem 0;border-left:1px solid var(--bd)}
.g-row{display:grid;grid-template-columns:240px 70px 1fr;border-bottom:1px solid var(--bd);align-items:center}
.g-row:hover{background:#F8F8F6}
.g-nome{padding:.35rem .6rem;font-size:.73rem;color:var(--ce);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-sub{font-size:.6rem;color:var(--cz)}
.g-ger{padding:.35rem .5rem;font-size:.66rem;color:var(--cz)}
.g-grid{display:grid;grid-template-columns:repeat(12,1fr)}
.g-cell{height:16px;border-left:1px solid var(--bd)}
.g-grp{background:#F0F2F6;padding:.35rem .6rem;font-size:.73rem;font-weight:700;border-bottom:1px solid var(--bd)}
.loading{text-align:center;padding:3rem;color:var(--cz)}
footer{padding:.65rem 2rem;font-size:.68rem;color:rgba(0,0,0,.28);text-align:center;border-top:1px solid var(--bd)}
</style>
</head>
<body>
<header>
  <a class="nav-back" href="index.html">← Início</a>
  <div class="sep"></div>
  <div class="sigla">SEGAPE</div>
  <div class="sep"></div>
  <div class="subt">Coordenação · Visão das ações e validação</div>
  <select class="sel" id="sel-coord" onchange="trocarCoord()">
    <option value="">— Selecione a coordenação —</option>
  </select>
  <button class="btn-h" onclick="gerarPDFCoordenacao()">📄 Relatório PDF</button>
</header>
<main>
  <div id="state-empty" class="loading">Selecione a coordenação</div>
  <div id="state-loading" class="loading" style="display:none">⏳ Carregando…</div>
  <div id="painel" style="display:none">
    <div class="kcards" id="kcards"></div>
    <div class="tabs">
      <div class="tab active" data-tab="acoes" onclick="tab('acoes')">Todas as ações</div>
      <div class="tab" data-tab="gantt" onclick="tab('gantt')">Gantt consolidado</div>
      <div class="tab" data-tab="aprov" onclick="tab('aprov')">Validação</div>
    </div>
    <div id="tab-acoes"></div>
    <div id="tab-gantt" style="display:none"><div class="gantt-wrap" id="gantt"></div></div>
    <div id="tab-aprov" style="display:none"><div id="aprov-list"></div></div>
  </div>
</main>
<footer>SEGAPE · Coordenação · <a href="index.html" style="color:inherit">Início</a></footer>
<script src="assets/dados.js"></script>
<script src="assets/db.js"></script>
<script src="assets/dashboard.js"></script>
<script>
let coordId=null, acoes=[], produtos=[], gerentes=[], mesAtual=new Date().getMonth()+1;

function fmtData(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}`;}
function getMesInicio(a){return a.data_inicio?new Date(a.data_inicio).getMonth()+1:null;}
function getMesFim(a){return a.data_fim?new Date(a.data_fim).getMonth()+1:null;}
function getNomeGerente(id){return gerentes.find(g=>g.id===id)?.nome||'—';}

function init(){
  const s=document.getElementById('sel-coord');
  HIERARQUIA.coordenacoes.forEach(c=>s.insertAdjacentHTML('beforeend',
    `<option value="${c.id}">${c.sigla} — ${c.coordenador.split(' ')[0]}</option>`));
}

async function trocarCoord(){
  coordId=document.getElementById('sel-coord').value;
  if(!coordId){show('empty');return;}
  await carregar();
  dbEscutar(()=>carregar());
}

async function carregar(){
  show('loading');
  try{
    [acoes, produtos, gerentes] = await Promise.all([
      dbListarAcoes(),
      dbListarProdutos(),
      dbListarGerentes(),
    ]);
    // Filtrar por coordenação
    const pids=produtos.filter(p=>p.coordenacao_id===coordId).map(p=>p.id);
    acoes=acoes.filter(a=>pids.includes(a.produto_id));
    renderPainel(); show('painel');
  }catch(e){alert('Erro: '+e.message);show('empty');}
}

function show(s){
  document.getElementById('state-empty').style.display=(s==='empty')?'block':'none';
  document.getElementById('state-loading').style.display=(s==='loading')?'block':'none';
  document.getElementById('painel').style.display=(s==='painel')?'block':'none';
}

function getProdutosCoord(){ return produtos.filter(p=>p.coordenacao_id===coordId); }

function renderPainel(){
  const prods=getProdutosCoord();
  const h=acoes.reduce((s,a)=>s+(a.horas_estimadas||0),0);
  const pend=acoes.filter(a=>a.aprovacao_coord==='pendente').length;
  const pct=acoes.length?Math.round(acoes.reduce((s,a)=>s+(a.percentual||0),0)/acoes.length):0;
  document.getElementById('kcards').innerHTML=`
    <div class="kc"><div class="kc-n">${prods.length}</div><div class="kc-l">Produtos</div></div>
    <div class="kc"><div class="kc-n">${acoes.length}</div><div class="kc-l">Ações</div></div>
    <div class="kc"><div class="kc-n">${h}h</div><div class="kc-l">Horas estimadas</div></div>
    <div class="kc ${pend>0?'alert':''}"><div class="kc-n">${pend}</div><div class="kc-l">Pendentes validação</div></div>
    <div class="kc"><div class="kc-n">${pct}%</div><div class="kc-l">Avanço médio</div></div>
  `;
  renderAcoes(); renderAprov();
  if(document.getElementById('tab-gantt').style.display==='block') renderGantt();
}

function renderAcoes(){
  const prods=getProdutosCoord();
  let html='';
  prods.forEach(p=>{
    const pa=acoes.filter(a=>a.produto_id===p.id);
    if(!pa.length) return;
    const tipo=TIPOS_PRODUTO[p.tipo]||{cor:'#888'};
    html+=`<div style="margin-bottom:1.25rem">
      <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem">
        <div style="width:9px;height:9px;border-radius:50%;background:${tipo.cor}"></div>
        <span style="font-family:Syne,sans-serif;font-weight:700;font-size:.87rem">${p.nome}</span>
        ${tipoBadge(p.tipo)}
      </div>
      <table class="t"><thead><tr>
        <th>Ação</th><th>Gerente</th><th>Fase</th><th>Cx</th>
        <th>Período</th><th>Horas</th><th>Avanço</th><th>Status</th><th>Validação</th>
      </tr></thead><tbody>
      ${pa.map(a=>{
        const g=getNomeGerente(a.gerente_id);
        const v=a.aprovacao_coord==='aprovado'
          ?`<span style="color:var(--verde);font-size:.72rem;font-weight:600">✓ Validado</span>`
          :a.aprovacao_coord==='rejeitado'
            ?`<span style="color:#B34A2A;font-size:.72rem;font-weight:600">✗ Devolvido</span>`
            :`<div style="display:flex;gap:3px">
               <button class="btn btn-ok" onclick="validar('${a.id}','aprovado')">✓</button>
               <button class="btn btn-no" onclick="validar('${a.id}','rejeitado')">✗</button>
             </div>`;
        return `<tr>
          <td><div style="font-weight:500">${a.titulo}</div>
            ${a.descricao?`<div style="font-size:.69rem;color:var(--cz)">${a.descricao}</div>`:''}
            ${a.observacao?`<div style="font-size:.68rem;color:var(--dou)">💬 ${a.observacao}</div>`:''}
          </td>
          <td style="font-size:.75rem">${g.split(' ')[0]}</td>
          <td>${faseBadge(a.fase)}</td><td>${complexBadge(a.complexidade)}</td>
          <td style="font-size:.75rem;white-space:nowrap">${a.data_inicio?fmtData(a.data_inicio):'—'}→${a.data_fim?fmtData(a.data_fim):'—'}</td>
          <td style="font-weight:600;color:var(--azul)">${a.horas_estimadas||0}h</td>
          <td><div style="display:flex;align-items:center;gap:3px">
            <div class="pbar"><div class="pfill" style="width:${a.percentual||0}%"></div></div>
            <span style="font-size:.71rem;color:var(--cz)">${a.percentual||0}%</span>
          </div></td>
          <td>${statusBadge(a.status)}</td><td>${v}</td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
  });
  document.getElementById('tab-acoes').innerHTML=html||'<div class="empty">Nenhuma ação cadastrada</div>';
}

async function validar(id,decisao){
  try{await dbAtualizarAcao(id,{aprovacao_coord:decisao});await carregar();}
  catch(e){alert('Erro: '+e.message);}
}

function renderGantt(){
  const prods=getProdutosCoord();
  let html=`<div class="gh-row">
    <div class="gc-lbl">Ação</div><div class="gc-lbl">Gerente</div>
    <div class="gm-hdr">${MESES.map(m=>`<div class="gm-lbl">${m}</div>`).join('')}</div>
  </div>`;
  prods.forEach(p=>{
    const pa=acoes.filter(a=>a.produto_id===p.id);
    if(!pa.length) return;
    const tipo=TIPOS_PRODUTO[p.tipo]||{cor:'#888'};
    html+=`<div class="g-grp" style="color:${tipo.cor}">${p.nome}</div>`;
    pa.forEach(a=>{
      const g=getNomeGerente(a.gerente_id);
      const cor=FASES[a.fase]?.cor||'#888';
      const mi=getMesInicio(a),mf=getMesFim(a);
      const cells=MESES.map((_,i)=>{
        const m=i+1,at=mi&&mf&&m>=mi&&m<=mf;
        return `<div class="g-cell" style="${at?`background:${cor}`:''};${m===mesAtual?'box-shadow:inset 0 0 0 1px var(--dou)':''}"></div>`;
      }).join('');
      html+=`<div class="g-row">
        <div class="g-nome">${a.titulo}<div class="g-sub">${a.horas_estimadas||0}h · ${COMPLEXIDADE[a.complexidade]?.label||''}</div></div>
        <div class="g-ger">${g.split(' ')[0]}</div>
        <div class="g-grid">${cells}</div>
      </div>`;
    });
  });
  document.getElementById('gantt').innerHTML=html;
}

function renderAprov(){
  const pend=acoes.filter(a=>a.aprovacao_coord==='pendente');
  if(!pend.length){document.getElementById('aprov-list').innerHTML='<div class="empty">Nenhuma ação pendente ✓</div>';return;}
  let html=`<div style="font-size:.8rem;color:var(--cz);margin-bottom:.5rem">${pend.length} ação(ões) aguardando validação</div>
  <table class="t"><thead><tr><th>Ação</th><th>Produto</th><th>Gerente</th><th>Horas</th><th>Cx</th><th>Período</th><th>Ação</th></tr></thead><tbody>
  ${pend.map(a=>`<tr>
    <td style="font-weight:500">${a.titulo}</td>
    <td style="font-size:.75rem">${produtos.find(p=>p.id===a.produto_id)?.nome||'—'}</td>
    <td style="font-size:.75rem">${getNomeGerente(a.gerente_id).split(' ')[0]}</td>
    <td style="font-weight:600;color:var(--azul)">${a.horas_estimadas||0}h</td>
    <td>${complexBadge(a.complexidade)}</td>
    <td style="font-size:.75rem;white-space:nowrap">${a.data_inicio?fmtData(a.data_inicio):'—'}→${a.data_fim?fmtData(a.data_fim):'—'}</td>
    <td><div style="display:flex;gap:3px">
      <button class="btn btn-ok" onclick="validar('${a.id}','aprovado')">✓ Validar</button>
      <button class="btn btn-no" onclick="validar('${a.id}','rejeitado')">✗ Devolver</button>
    </div></td>
  </tr>`).join('')}
  </tbody></table>`;
  document.getElementById('aprov-list').innerHTML=html;
}

// ============================================================
// RELATÓRIO PDF DA COORDENAÇÃO (com dashboard e panorama temporal)
// ============================================================
async function gerarPDFCoordenacao(){
  if(!coordId){alert('Selecione a coordenação primeiro.');return;}
  const coord=HIERARQUIA.coordenacoes.find(c=>c.id===coordId);
  const prods=getProdutosCoord();
  if(!prods.length){alert('Nenhum produto cadastrado nesta coordenação.');return;}
  let colabs=[];
  try{colabs=await dbListarColaboradores();}catch(e){}
  gerarRelatorioConsolidado({
    titulo:    `Relatório da Coordenação — ${coord?.sigla||''}`,
    subtitulo: `${coord?.nome||''}${coord?.coordenador?' · '+coord.coordenador:''}`,
    produtos:  prods,
    acoes:     acoes,
    colaboradores: colabs,
    graficosExtras: [
      dashGraficoPorGerente(acoes, gerentes),
      ...dashGraficosPorProduto(prods, acoes),
    ],
  });
}

function tab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  ['acoes','gantt','aprov'].forEach(x=>document.getElementById('tab-'+x).style.display=(x===t)?'block':'none');
  if(t==='gantt') renderGantt();
}
init();
</script>
</body>
</html>
