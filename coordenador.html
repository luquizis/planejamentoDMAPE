<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEGAPE — Coordenação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --azul:#1B3A6B; --azul-medio:#2E5CA8; --azul-claro:#5B8DD9;
  --verde:#1D7A55; --dourado:#C8922A; --cinza-escuro:#2C2C2C;
  --cinza:#5F5F5F; --cinza-claro:#F4F3EF; --branco:#FAFAF8; --borda:rgba(0,0,0,0.09);
}
body { font-family:'DM Sans',sans-serif; background:var(--cinza-claro); min-height:100vh; display:flex; flex-direction:column; }
header { background:var(--azul); padding:1rem 2rem; display:flex; align-items:center; gap:1rem; }
.logo-sigla { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; color:#E8B84B; }
.sep { width:1px; height:32px; background:rgba(255,255,255,0.2); margin:0 0.6rem; }
.logo-nome { font-size:0.7rem; color:rgba(255,255,255,0.5); }
.nav-back { font-size:0.75rem; color:rgba(255,255,255,0.55); text-decoration:none; }
.perfil-select { margin-left:auto; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:white; font-size:0.78rem; padding:0.35rem 0.6rem; border-radius:6px; cursor:pointer; }
.perfil-select option { background:#1B3A6B; }
main { flex:1; padding:1.5rem 2rem; max-width:1400px; margin:0 auto; width:100%; }

.tabs { display:flex; gap:0; border-bottom:2px solid var(--borda); margin-bottom:1.5rem; }
.tab { padding:0.6rem 1.25rem; font-size:0.82rem; font-weight:500; color:var(--cinza); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
.tab.active { color:var(--azul); border-color:var(--azul); font-weight:600; }

.resumo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
.rcard { background:var(--branco); border:1px solid var(--borda); border-radius:10px; padding:0.9rem 1rem; }
.rcard-n { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--azul); }
.rcard-l { font-size:0.7rem; color:var(--cinza); text-transform:uppercase; margin-top:2px; }

.acoes-table { width:100%; border-collapse:collapse; background:var(--branco); border-radius:12px; overflow:hidden; border:1px solid var(--borda); font-size:0.82rem; margin-bottom:1.5rem; }
.acoes-table th { background:#F0F2F6; padding:0.6rem 0.85rem; text-align:left; font-size:0.7rem; font-weight:600; color:var(--cinza); text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid var(--borda); }
.acoes-table td { padding:0.7rem 0.85rem; border-bottom:1px solid var(--borda); vertical-align:middle; }
.acoes-table tr:last-child td { border-bottom:none; }
.acoes-table tr:hover td { background:#F8F8F6; }
.progress-bar { width:70px; height:8px; background:#E5E5E0; border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:4px; }
.progress-fill { height:100%; border-radius:4px; background:var(--azul-medio); }

.section-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; color:var(--cinza-escuro); margin-bottom:0.75rem; }
.btn { padding:0.4rem 0.85rem; border-radius:7px; font-size:0.78rem; font-weight:500; cursor:pointer; border:none; }
.btn-approve { background:#E0F5ED; color:#1D7A55; border:1px solid #1D7A5540; }
.btn-reject  { background:#FFF0EC; color:#B34A2A; border:1px solid #B34A2A40; }
.btn-outline { background:transparent; border:1.5px solid var(--borda); color:var(--cinza-escuro); }
.empty-state { text-align:center; padding:2.5rem; color:var(--cinza); font-size:0.85rem; background:var(--branco); border:1px solid var(--borda); border-radius:10px; }

.gantt-wrap { background:var(--branco); border:1px solid var(--borda); border-radius:12px; overflow:auto; }
.gantt-header-row { display:grid; grid-template-columns:260px 80px 1fr; border-bottom:1px solid var(--borda); }
.gantt-col-label { padding:0.5rem 0.75rem; font-size:0.68rem; color:var(--cinza); font-weight:600; text-transform:uppercase; }
.gantt-meses-header { display:grid; grid-template-columns:repeat(12,1fr); }
.gantt-mes { font-size:0.63rem; color:var(--cinza); text-align:center; padding:0.4rem 0; border-left:1px solid var(--borda); }
.gantt-row { display:grid; grid-template-columns:260px 80px 1fr; border-bottom:1px solid var(--borda); align-items:center; }
.gantt-nome { padding:0.4rem 0.75rem; font-size:0.76rem; color:var(--cinza-escuro); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gantt-sub { font-size:0.63rem; color:var(--cinza); }
.gantt-gerente { padding:0.4rem 0.5rem; font-size:0.68rem; color:var(--cinza); }
.gantt-grid { display:grid; grid-template-columns:repeat(12,1fr); }
.gantt-cell { height:18px; border-left:1px solid var(--borda); }

.produto-group-header { background:#F0F2F6; padding:0.5rem 0.75rem; font-size:0.78rem; font-weight:700; color:var(--azul); border-bottom:1px solid var(--borda); border-top:1px solid var(--borda); }
footer { padding:0.75rem 2rem; font-size:0.7rem; color:rgba(0,0,0,0.28); text-align:center; border-top:1px solid var(--borda); }
</style>
</head>
<body>
<header>
  <a class="nav-back" href="index.html">← Voltar</a>
  <div class="sep"></div>
  <div class="logo-sigla">SEGAPE</div>
  <div class="sep"></div>
  <div class="logo-nome">Coordenação · Visão de ações e validação</div>
  <select class="perfil-select" id="coord-select" onchange="trocarCoord()">
    <option value="">Selecione a coordenação</option>
  </select>
</header>

<main>
  <div id="sem-coord" style="text-align:center;padding:4rem;color:var(--cinza)">
    <div style="font-size:2rem;margin-bottom:0.5rem">📋</div>
    <div>Selecione a coordenação para ver as ações dos gerentes</div>
  </div>

  <div id="painel-coord" style="display:none">
    <div class="resumo-grid" id="resumo-cards"></div>

    <div class="tabs">
      <div class="tab active" data-tab="acoes" onclick="trocarTab('acoes')">Todas as ações</div>
      <div class="tab" data-tab="gantt" onclick="trocarTab('gantt')">Gantt consolidado</div>
      <div class="tab" data-tab="aprovacao" onclick="trocarTab('aprovacao')">Validação</div>
    </div>

    <div id="tab-acoes">
      <div id="acoes-container"></div>
    </div>
    <div id="tab-gantt" style="display:none">
      <div class="gantt-wrap" id="gantt-container"></div>
    </div>
    <div id="tab-aprovacao" style="display:none">
      <div id="aprovacao-container"></div>
    </div>
  </div>
</main>

<footer>SEGAPE · Coordenação · v3.0 — <a href="index.html" style="color:inherit">Início</a></footer>

<script src="assets/dados.js"></script>
<script>
let coordAtual = null;

function init() {
  const sel = document.getElementById('coord-select');
  HIERARQUIA.coordenacoes.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id;
    o.textContent = c.sigla + ' — ' + c.coordenador.split(' ')[0];
    sel.appendChild(o);
  });
}

function trocarCoord() {
  coordAtual = document.getElementById('coord-select').value;
  if (!coordAtual) {
    document.getElementById('sem-coord').style.display = 'block';
    document.getElementById('painel-coord').style.display = 'none';
    return;
  }
  document.getElementById('sem-coord').style.display = 'none';
  document.getElementById('painel-coord').style.display = 'block';
  renderPainel();
}

function trocarTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  ['acoes','gantt','aprovacao'].forEach(t => {
    document.getElementById('tab-'+t).style.display = (t===tab)?'block':'none';
  });
  if (tab==='gantt') renderGantt();
  if (tab==='aprovacao') renderAprovacao();
}

function getProdutosCoord() {
  return PRODUTOS_CATALOGO.filter(p => p.coordenacao_id === coordAtual);
}

function getAcoesCoord() {
  const produtos = getProdutosCoord().map(p=>p.id);
  return getData().acoes.filter(a => produtos.includes(a.produto_id));
}

function renderPainel() {
  const acoes = getAcoesCoord();
  const pendentes = acoes.filter(a => a.aprovacao_coord === 'pendente').length;
  const horas = acoes.reduce((s,a)=>s+(a.horas_estimadas||0),0);
  const conc = acoes.filter(a=>a.status==='concluido').length;
  const pct = acoes.length ? Math.round(acoes.reduce((s,a)=>s+(a.percentual||0),0)/acoes.length) : 0;

  document.getElementById('resumo-cards').innerHTML = `
    <div class="rcard"><div class="rcard-n">${getProdutosCoord().length}</div><div class="rcard-l">Produtos</div></div>
    <div class="rcard"><div class="rcard-n">${acoes.length}</div><div class="rcard-l">Ações</div></div>
    <div class="rcard"><div class="rcard-n">${horas}h</div><div class="rcard-l">Horas estimadas</div></div>
    <div class="rcard"><div class="rcard-n" style="${pendentes>0?'color:var(--dourado)':''}">${pendentes}</div><div class="rcard-l">Pendentes validação</div></div>
    <div class="rcard"><div class="rcard-n">${conc}</div><div class="rcard-l">Concluídas</div></div>
    <div class="rcard"><div class="rcard-n">${pct}%</div><div class="rcard-l">Avanço médio</div></div>
  `;

  renderAcoes();
}

function renderAcoes() {
  const produtos = getProdutosCoord();
  const data = getData();
  let html = '';

  produtos.forEach(p => {
    const acoes = data.acoes.filter(a => a.produto_id === p.id);
    if (acoes.length === 0) return;
    const tipo = TIPOS_PRODUTO[p.tipo] || { cor:'#888' };

    html += `<div style="margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
        <div style="width:10px;height:10px;border-radius:50%;background:${tipo.cor}"></div>
        <span class="section-title" style="margin:0">${p.nome}</span>
        ${tipoProdutoBadgeHTML(p.tipo)}
        <span style="font-size:0.74rem;color:var(--cinza);margin-left:4px">${acoes.length} ação(ões)</span>
      </div>
      <table class="acoes-table">
        <thead><tr>
          <th>Ação</th><th>Gerente</th><th>Executor</th><th>Fase</th><th>Complexidade</th>
          <th>Período</th><th>Horas</th><th>Avanço</th><th>Status</th><th>Validação</th>
        </tr></thead>
        <tbody>
          ${acoes.map(a => {
            const gerente = getMembroEquipe(a.gerente_id);
            const exec = a.executor_id ? getMembroEquipe(a.executor_id) : null;
            const aprov = a.aprovacao_coord;
            const aprovHTML = aprov === 'aprovado'
              ? `<span style="color:var(--verde);font-size:0.75rem;font-weight:600">✓ Validado</span>`
              : aprov === 'rejeitado'
                ? `<span style="color:#B34A2A;font-size:0.75rem;font-weight:600">✗ Devolvido</span>`
                : `<div style="display:flex;gap:4px">
                    <button class="btn btn-approve" onclick="validarAcao('${a.id}','aprovado')">✓</button>
                    <button class="btn btn-reject" onclick="validarAcao('${a.id}','rejeitado')">✗</button>
                   </div>`;
            return `<tr>
              <td><div style="font-weight:500;font-size:0.82rem">${a.titulo}</div>${a.descricao?`<div style="font-size:0.71rem;color:var(--cinza)">${a.descricao}</div>`:''}</td>
              <td style="font-size:0.78rem">${gerente?.nome.split(' ')[0]||'—'}</td>
              <td style="font-size:0.78rem">${exec ? exec.nome.split(' ').slice(0,2).join(' ')+'<br>'+vincBadgeHTML(exec.vinculo) : '—'}</td>
              <td>${faseBadgeHTML(a.fase)}</td>
              <td>${complexidadeBadgeHTML(a.complexidade)}</td>
              <td style="white-space:nowrap;font-size:0.78rem">${mesToNome(a.mes_inicio)} → ${mesToNome(a.mes_fim)}</td>
              <td style="font-size:0.82rem;font-weight:500;color:var(--azul)">${a.horas_estimadas||'—'}h</td>
              <td>
                <div style="display:flex;align-items:center;gap:4px">
                  <div class="progress-bar"><div class="progress-fill" style="width:${a.percentual||0}%"></div></div>
                  <span style="font-size:0.74rem;color:var(--cinza)">${a.percentual||0}%</span>
                </div>
              </td>
              <td>${statusBadgeHTML(a.status)}</td>
              <td>${aprovHTML}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  });

  document.getElementById('acoes-container').innerHTML = html || '<div class="empty-state">Nenhuma ação cadastrada pelos gerentes desta coordenação</div>';
}

function validarAcao(id, decisao) {
  atualizarAcao(id, { aprovacao_coord: decisao });
  renderPainel();
}

function renderGantt() {
  const produtos = getProdutosCoord();
  const data = getData();
  const mesAtual = new Date().getMonth() + 1;

  let html = `<div class="gantt-header-row">
    <div class="gantt-col-label">Ação</div>
    <div class="gantt-col-label">Gerente</div>
    <div class="gantt-meses-header">${MESES.map(m=>`<div class="gantt-mes">${m}</div>`).join('')}</div>
  </div>`;

  produtos.forEach(p => {
    const acoes = data.acoes.filter(a => a.produto_id === p.id);
    if (acoes.length === 0) return;
    const tipo = TIPOS_PRODUTO[p.tipo] || { cor:'#888' };
    html += `<div class="produto-group-header" style="color:${tipo.cor}">${p.nome}</div>`;

    acoes.forEach(a => {
      const gerente = getMembroEquipe(a.gerente_id);
      const cor = FASES[a.fase]?.cor || '#888';
      const cells = MESES.map((_,i) => {
        const mes = i+1;
        const ativo = mes >= a.mes_inicio && mes <= a.mes_fim;
        return `<div class="gantt-cell ${ativo?'ativo':''}" style="${ativo?`background:${cor}`:''};${mes===mesAtual?'box-shadow:inset 0 0 0 1px #C8922A':''}"></div>`;
      }).join('');

      html += `<div class="gantt-row">
        <div class="gantt-nome">${a.titulo}<div class="gantt-sub">${a.horas_estimadas||0}h · ${COMPLEXIDADE[a.complexidade]?.label||''}</div></div>
        <div class="gantt-gerente">${gerente?.nome.split(' ')[0]||'—'}</div>
        <div class="gantt-grid">${cells}</div>
      </div>`;
    });
  });

  document.getElementById('gantt-container').innerHTML = html;
}

function renderAprovacao() {
  const acoes = getAcoesCoord().filter(a => a.aprovacao_coord === 'pendente');
  if (acoes.length === 0) {
    document.getElementById('aprovacao-container').innerHTML = '<div class="empty-state">Nenhuma ação pendente de validação ✓</div>';
    return;
  }

  let html = `<div style="margin-bottom:0.5rem;font-size:0.82rem;color:var(--cinza)">${acoes.length} ação(ões) aguardando validação</div>
  <table class="acoes-table">
    <thead><tr><th>Ação</th><th>Produto</th><th>Gerente</th><th>Executor</th><th>Horas</th><th>Complexidade</th><th>Período</th><th>Ação</th></tr></thead>
    <tbody>
      ${acoes.map(a => {
        const p = getProduto(a.produto_id);
        const gerente = getMembroEquipe(a.gerente_id);
        const exec = a.executor_id ? getMembroEquipe(a.executor_id) : null;
        return `<tr>
          <td><div style="font-weight:500">${a.titulo}</div></td>
          <td style="font-size:0.78rem">${p?.nome||'—'}</td>
          <td style="font-size:0.78rem">${gerente?.nome.split(' ')[0]||'—'}</td>
          <td style="font-size:0.78rem">${exec?.nome.split(' ').slice(0,2).join(' ')||'—'}</td>
          <td style="font-weight:500;color:var(--azul)">${a.horas_estimadas||0}h</td>
          <td>${complexidadeBadgeHTML(a.complexidade)}</td>
          <td style="white-space:nowrap;font-size:0.78rem">${mesToNome(a.mes_inicio)} → ${mesToNome(a.mes_fim)}</td>
          <td>
            <div style="display:flex;gap:4px">
              <button class="btn btn-approve" onclick="validarAcao('${a.id}','aprovado')">✓ Validar</button>
              <button class="btn btn-reject" onclick="validarAcao('${a.id}','rejeitado')">✗ Devolver</button>
            </div>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('aprovacao-container').innerHTML = html;
}

init();
</script>
</body>
</html>
