<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEGAPE — Secretaria</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1B3A6B;--azm:#2E5CA8;--verde:#1D7A55;--dou:#C8922A;--douc:#E8B84B;--ce:#2C2C2C;--cz:#5F5F5F;--cl:#F4F3EF;--br:#FAFAF8;--bd:rgba(0,0,0,0.09)}
body{font-family:'DM Sans',sans-serif;background:var(--cl);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--azul);padding:.9rem 2rem;display:flex;align-items:center;gap:.75rem}
.sigla{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem;color:var(--douc)}
.sep{width:1px;height:28px;background:rgba(255,255,255,.2);margin:0 .5rem}
.subt{font-size:.68rem;color:rgba(255,255,255,.5)}
.nav-back{font-size:.72rem;color:rgba(255,255,255,.55);text-decoration:none}
.hright{margin-left:auto;display:flex;gap:.4rem}
.btn-h{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:.72rem;padding:.3rem .65rem;border-radius:6px;cursor:pointer}
main{flex:1;padding:1.25rem 2rem;max-width:1400px;margin:0 auto;width:100%}
.kcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;margin-bottom:1.5rem}
.kc{background:var(--br);border:1px solid var(--bd);border-radius:10px;padding:.85rem 1rem}
.kc-n{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--azul)}
.kc-l{font-size:.67rem;color:var(--cz);text-transform:uppercase;margin-top:3px}
.kc.alert .kc-n{color:var(--dou)}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:1.25rem}
.tab{padding:.55rem 1.1rem;font-size:.8rem;font-weight:500;color:var(--cz);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--azul);border-color:var(--azul);font-weight:600}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem}
.chart-card{background:var(--br);border:1px solid var(--bd);border-radius:10px;padding:1.1rem}
.chart-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;margin-bottom:.9rem;color:var(--ce)}
.pm{background:var(--br);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
.pm-hdr{display:grid;grid-template-columns:200px repeat(4,1fr);background:#F0F2F6;border-bottom:1px solid var(--bd)}
.pm-row{display:grid;grid-template-columns:200px repeat(4,1fr);border-bottom:1px solid var(--bd)}
.pm-row:last-child{border-bottom:none}
.pm-row:hover{background:#F8F8F6}
.pm-c{padding:.5rem .7rem;font-size:.68rem;font-weight:600;color:var(--cz);text-transform:uppercase;border-right:1px solid var(--bd)}
.pm-v{padding:.55rem .7rem;font-size:.79rem;text-align:center;border-right:1px solid var(--bd)}
.pm-bar{height:5px;border-radius:3px;background:var(--azm);margin-top:3px}
table.t{width:100%;border-collapse:collapse;background:var(--br);border-radius:10px;overflow:hidden;border:1px solid var(--bd);font-size:.79rem}
table.t th{background:#F0F2F6;padding:.5rem .7rem;text-align:left;font-size:.66rem;font-weight:600;color:var(--cz);text-transform:uppercase;border-bottom:1px solid var(--bd)}
table.t td{padding:.55rem .7rem;border-bottom:1px solid var(--bd);vertical-align:middle}
table.t tr:last-child td{border-bottom:none}
.btn{padding:.32rem .75rem;border-radius:6px;font-size:.74rem;font-weight:500;cursor:pointer;border:none}
.btn-ok{background:#E0F5ED;color:var(--verde);border:1px solid #1D7A5540}
.pbar{width:60px;height:6px;background:#E5E5E0;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:3px}
.pfill{height:100%;border-radius:4px;background:var(--azm)}
.gantt-wrap{background:var(--br);border:1px solid var(--bd);border-radius:10px;overflow:auto}
.gh-row{display:grid;grid-template-columns:210px 70px 1fr;border-bottom:1px solid var(--bd)}
.gc-lbl{padding:.4rem .55rem;font-size:.64rem;font-weight:600;color:var(--cz);text-transform:uppercase}
.gm-hdr{display:grid;grid-template-columns:repeat(12,1fr)}
.gm-lbl{font-size:.59rem;color:var(--cz);text-align:center;padding:.32rem 0;border-left:1px solid var(--bd)}
.g-row{display:grid;grid-template-columns:210px 70px 1fr;border-bottom:1px solid var(--bd);align-items:center}
.g-row:hover{background:#F8F8F6}
.g-nome{padding:.32rem .55rem;font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-sub{font-size:.59rem;color:var(--cz)}
.g-lbl{padding:.32rem .45rem;font-size:.65rem;color:var(--cz)}
.g-grid{display:grid;grid-template-columns:repeat(12,1fr)}
.g-cell{height:15px;border-left:1px solid var(--bd)}
.g-grp{background:#F0F2F6;padding:.32rem .55rem;font-size:.72rem;font-weight:700;border-bottom:1px solid var(--bd)}
.empty{text-align:center;padding:2rem;color:var(--cz);font-size:.82rem;background:var(--br);border:1px solid var(--bd);border-radius:10px}
.loading{text-align:center;padding:3rem;color:var(--cz)}
footer{padding:.65rem 2rem;font-size:.68rem;color:rgba(0,0,0,.28);text-align:center;border-top:1px solid var(--bd)}
</style>
</head>
<body>
<header>
  <a class="nav-back" href="index.html">← Início</a>
  <div class="sep"></div>
  <div class="sigla">SEGAPE</div>
  <div class="sep"></div>
  <div class="subt">Secretaria · Painel executivo — visão completa das entregas</div>
  <div class="hright">
    <button class="btn-h" onclick="gerarPDFGeral()">📄 Relatório PDF</button>
    <button class="btn-h" onclick="carregar()">↻ Atualizar</button>
  </div>
</header>
<main>
  <div id="state-loading" class="loading">⏳ Carregando dados do Supabase…</div>
  <div id="painel" style="display:none">
    <div class="kcards" id="kcards"></div>
    <div class="tabs">
      <div class="tab active" data-tab="visao" onclick="tab('visao')">Visão geral</div>
      <div class="tab" data-tab="gantt" onclick="tab('gantt')">Gantt completo</div>
      <div class="tab" data-tab="aprov" onclick="tab('aprov')">Aprovação final</div>
    </div>
    <div id="tab-visao">
      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Ações por status</div><canvas id="ch-status" height="200"></canvas></div>
        <div class="chart-card"><div class="chart-title">Horas estimadas por produto</div><canvas id="ch-horas" height="200"></canvas></div>
      </div>
      <div style="font-family:Syne,sans-serif;font-weight:700;font-size:.88rem;color:var(--ce);margin-bottom:.6rem">Visão por produto</div>
      <div class="pm" id="pm"></div>
    </div>
    <div id="tab-gantt" style="display:none"><div class="gantt-wrap" id="gantt"></div></div>
    <div id="tab-aprov" style="display:none"><div id="aprov-list"></div></div>
  </div>
</main>
<footer>SEGAPE · Secretaria · Projeto UNESCO 914BRZ1161.1 · <a href="index.html" style="color:inherit">Início</a></footer>
<script src="dados.js"></script>
<script src="db.js"></script>
<script>
let acoes=[], charts={}, mesAtual=new Date().getMonth()+1;

async function carregar(){
  document.getElementById('state-loading').style.display='block';
  document.getElementById('painel').style.display='none';
  try{
    acoes=await dbListarAcoes();
    renderPainel();
    document.getElementById('state-loading').style.display='none';
    document.getElementById('painel').style.display='block';
  }catch(e){
    document.getElementById('state-loading').textContent='Erro ao carregar: '+e.message;
  }
}

function renderPainel(){
  const h=acoes.reduce((s,a)=>s+(a.horas_estimadas||0),0);
  const pendSec=acoes.filter(a=>a.aprovacao_dir==='aprovado'&&a.aprovacao_sec==='pendente').length;
  const hBol=acoes.reduce((s,a)=>{
    const e=getMembroEquipe(a.executor_id);
    return s+(e?.nivel==='bolsista'?(a.horas_estimadas||0):0);
  },0);
  const pct=acoes.length?Math.round(acoes.reduce((s,a)=>s+(a.percentual||0),0)/acoes.length):0;
  document.getElementById('kcards').innerHTML=`
    <div class="kc"><div class="kc-n">${PRODUTOS_CATALOGO.length}</div><div class="kc-l">Produtos Educadados</div></div>
    <div class="kc"><div class="kc-n">${acoes.length}</div><div class="kc-l">Ações planejadas</div></div>
    <div class="kc"><div class="kc-n">${h}h</div><div class="kc-l">Horas totais</div></div>
    <div class="kc"><div class="kc-n">${hBol}h</div><div class="kc-l">Horas bolsistas</div></div>
    <div class="kc"><div class="kc-n">${acoes.filter(a=>a.status==='concluido').length}</div><div class="kc-l">Concluídas</div></div>
    <div class="kc"><div class="kc-n">${pct}%</div><div class="kc-l">Avanço médio</div></div>
    <div class="kc ${pendSec>0?'alert':''}"><div class="kc-n">${pendSec}</div><div class="kc-l">Ag. aprovação sec.</div></div>
  `;
  renderVisao();
  renderAprov();
  if(document.getElementById('tab-gantt').style.display==='block') renderGantt();
}

function renderVisao(){
  // Chart status
  const sc={};
  Object.keys(STATUS_LABELS).forEach(k=>{sc[k]=0;});
  acoes.forEach(a=>{sc[a.status]=(sc[a.status]||0)+1;});
  const sk=Object.keys(sc).filter(k=>sc[k]>0);
  if(charts.status) charts.status.destroy();
  charts.status=new Chart(document.getElementById('ch-status'),{
    type:'doughnut',
    data:{labels:sk.map(k=>STATUS_LABELS[k]?.label||k),
      datasets:[{data:sk.map(k=>sc[k]),backgroundColor:sk.map(k=>STATUS_LABELS[k]?.cor||'#888'),borderWidth:2,borderColor:'white'}]},
    options:{plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}},cutout:'65%'}
  });
  // Chart horas por produto
  const ph=PRODUTOS_CATALOGO.map(p=>({
    nome:p.nome.split(' ').slice(0,3).join(' '),
    h:acoes.filter(a=>a.produto_id===p.id).reduce((s,a)=>s+(a.horas_estimadas||0),0)
  })).filter(x=>x.h>0).sort((a,b)=>b.h-a.h);
  if(charts.horas) charts.horas.destroy();
  charts.horas=new Chart(document.getElementById('ch-horas'),{
    type:'bar',
    data:{labels:ph.map(x=>x.nome),
      datasets:[{data:ph.map(x=>x.h),backgroundColor:'#2E5CA820',borderColor:'#2E5CA8',borderWidth:1.5,borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#eee'}},x:{grid:{display:false}}}}
  });
  // Matriz produtos
  let html=`<div class="pm-hdr">
    <div class="pm-c">Produto</div><div class="pm-c">Ações</div>
    <div class="pm-c">Horas</div><div class="pm-c">Avanço</div><div class="pm-c">Tipo</div>
  </div>`;
  PRODUTOS_CATALOGO.forEach(p=>{
    const pa=acoes.filter(a=>a.produto_id===p.id);
    const h=pa.reduce((s,a)=>s+(a.horas_estimadas||0),0);
    const pct=pa.length?Math.round(pa.reduce((s,a)=>s+(a.percentual||0),0)/pa.length):0;
    const g=getMembroEquipe(p.gerente_id);
    html+=`<div class="pm-row">
      <div class="pm-v" style="text-align:left"><div style="font-weight:600">${p.nome}</div>
        <div style="font-size:.68rem;color:var(--cz)">${g?.nome.split(' ').slice(0,2).join(' ')||'—'} · ${p.coordenacao_id.toUpperCase()}</div></div>
      <div class="pm-v">${pa.length}</div>
      <div class="pm-v" style="font-weight:600;color:var(--azul)">${h}h</div>
      <div class="pm-v"><div>${pct}%</div><div class="pm-bar" style="width:${pct}%"></div></div>
      <div class="pm-v">${tipoBadge(p.tipo)}</div>
    </div>`;
  });
  document.getElementById('pm').innerHTML=html;
}

function renderGantt(){
  let html=`<div class="gh-row">
    <div class="gc-lbl">Ação</div><div class="gc-lbl">Gerente/h</div>
    <div class="gm-hdr">${MESES.map(m=>`<div class="gm-lbl">${m}</div>`).join('')}</div>
  </div>`;
  PRODUTOS_CATALOGO.forEach(p=>{
    const pa=acoes.filter(a=>a.produto_id===p.id);
    if(!pa.length) return;
    const tipo=TIPOS_PRODUTO[p.tipo]||{cor:'#888'};
    html+=`<div class="g-grp" style="color:${tipo.cor}">${p.nome}</div>`;
    pa.forEach(a=>{
      const g=getMembroEquipe(a.gerente_id),cor=FASES[a.fase]?.cor||'#888';
      const cells=MESES.map((_,i)=>{
        const m=i+1,at=m>=a.mes_inicio&&m<=a.mes_fim;
        return `<div class="g-cell" style="${at?`background:${cor}`:''};${m===mesAtual?'box-shadow:inset 0 0 0 1px var(--dou)':''}"></div>`;
      }).join('');
      html+=`<div class="g-row">
        <div class="g-nome">${a.titulo}<div class="g-sub">${COMPLEXIDADE[a.complexidade]?.label||''} · ${faseBadge(a.fase)}</div></div>
        <div class="g-lbl">${g?.nome.split(' ')[0]||'—'}<br><span style="font-weight:700;color:var(--azul)">${a.horas_estimadas||0}h</span></div>
        <div class="g-grid">${cells}</div>
      </div>`;
    });
  });
  document.getElementById('gantt').innerHTML=html||'<div style="padding:2rem;text-align:center;color:var(--cz)">Nenhuma ação cadastrada</div>';
}

function renderAprov(){
  const pend=acoes.filter(a=>a.aprovacao_dir==='aprovado'&&a.aprovacao_sec==='pendente');
  if(!pend.length){document.getElementById('aprov-list').innerHTML='<div class="empty">Nenhuma ação aguardando aprovação da secretaria ✓</div>';return;}
  let html=`<div style="font-size:.8rem;color:var(--cz);margin-bottom:.5rem">${pend.length} ação(ões) aprovadas pela diretoria aguardando aprovação do secretário</div>
  <table class="t"><thead><tr><th>Ação</th><th>Produto</th><th>Gerente</th><th>Executor</th><th>Horas</th><th>Cx</th><th>Período</th><th>Aprovação</th></tr></thead><tbody>
  ${pend.map(a=>{
    const p=getProduto(a.produto_id),g=getMembroEquipe(a.gerente_id),ex=a.executor_id?getMembroEquipe(a.executor_id):null;
    return `<tr>
      <td style="font-weight:500">${a.titulo}</td>
      <td style="font-size:.73rem">${p?.nome||'—'}</td>
      <td style="font-size:.73rem">${g?.nome.split(' ')[0]||'—'}</td>
      <td style="font-size:.73rem">${ex?ex.nome.split(' ').slice(0,2).join(' '):'—'}</td>
      <td style="font-weight:600;color:var(--azul)">${a.horas_estimadas||0}h</td>
      <td>${complexBadge(a.complexidade)}</td>
      <td style="font-size:.73rem;white-space:nowrap">${mesToNome(a.mes_inicio)}→${mesToNome(a.mes_fim)}</td>
      <td><button class="btn btn-ok" onclick="aprovarSec('${a.id}')">✓ Aprovar</button></td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
  document.getElementById('aprov-list').innerHTML=html;
}

async function aprovarSec(id){
  try{await dbAtualizarAcao(id,{aprovacao_sec:'aprovado'});await carregar();}
  catch(e){alert('Erro: '+e.message);}
}

function gerarPDFGeral(){
  const h=acoes.reduce((s,a)=>s+(a.horas_estimadas||0),0);
  const pct=acoes.length?Math.round(acoes.reduce((s,a)=>s+(a.percentual||0),0)/acoes.length):0;
  const rows=PRODUTOS_CATALOGO.map(p=>{
    const pa=acoes.filter(a=>a.produto_id===p.id);
    const ph=pa.reduce((s,a)=>s+(a.horas_estimadas||0),0);
    const ppct=pa.length?Math.round(pa.reduce((s,a)=>s+(a.percentual||0),0)/pa.length):0;
    const g=getMembroEquipe(p.gerente_id);
    return `<tr><td>${p.nome}</td><td>${TIPOS_PRODUTO[p.tipo]?.label||p.tipo}</td><td>${g?.nome.split(' ').slice(0,2).join(' ')||'—'}</td><td>${pa.length}</td><td>${ph}h</td><td>${ppct}%</td></tr>`;
  }).join('');
  gerarPDF('Planejamento SEGAPE — Visão Geral',`
    <h1>SEGAPE — Planejamento de Publicações Educadados</h1>
    <p class="sub">Total: ${acoes.length} ações · ${h}h estimadas · ${pct}% avanço médio</p>
    <h2>Resumo por produto</h2>
    <table>
      <thead><tr><th>Produto</th><th>Tipo</th><th>Gerente</th><th>Ações</th><th>Horas</th><th>Avanço</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `);
}

function tab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  ['visao','gantt','aprov'].forEach(x=>document.getElementById('tab-'+x).style.display=(x===t)?'block':'none');
  if(t==='gantt') renderGantt();
}

// Realtime
dbEscutar(()=>carregar());
carregar();
</script>
</body>
</html>
