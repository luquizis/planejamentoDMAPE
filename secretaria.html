<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEGAPE — Secretaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --azul:#1B3A6B; --azul-medio:#2E5CA8; --azul-claro:#5B8DD9;
  --verde:#1D7A55; --dourado:#C8922A; --cinza-escuro:#2C2C2C;
  --cinza:#5F5F5F; --cinza-claro:#F4F3EF; --branco:#FAFAF8; --borda:rgba(0,0,0,0.09);
}
body { font-family:'DM Sans',sans-serif; background:var(--cinza-claro); min-height:100vh; display:flex; flex-direction:column; }
header { background:var(--azul); padding:1rem 2rem; display:flex; align-items:center; gap:1rem; }
.logo-sigla { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; color:#E8B84B; }
.sep { width:1px; height:32px; background:rgba(255,255,255,0.2); margin:0 0.6rem; }
.logo-nome { font-size:0.7rem; color:rgba(255,255,255,0.5); max-width:400px; }
.nav-back { font-size:0.75rem; color:rgba(255,255,255,0.55); text-decoration:none; }
.header-right { margin-left:auto; display:flex; gap:0.5rem; }
.btn-h { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:white; font-size:0.75rem; padding:0.35rem 0.75rem; border-radius:6px; cursor:pointer; }
main { flex:1; padding:1.5rem 2rem; max-width:1400px; margin:0 auto; width:100%; }

.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:0.75rem; margin-bottom:1.75rem; }
.kpi { background:var(--branco); border:1px solid var(--borda); border-radius:12px; padding:1rem 1.1rem; }
.kpi-n { font-family:'Syne',sans-serif; font-weight:800; font-size:1.6rem; color:var(--azul); }
.kpi-l { font-size:0.7rem; color:var(--cinza); text-transform:uppercase; margin-top:3px; }
.kpi.alert .kpi-n { color:var(--dourado); }

.tabs { display:flex; gap:0; border-bottom:2px solid var(--borda); margin-bottom:1.5rem; }
.tab { padding:0.6rem 1.25rem; font-size:0.82rem; font-weight:500; color:var(--cinza); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; }
.tab.active { color:var(--azul); border-color:var(--azul); font-weight:600; }

/* Charts */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:1.75rem; }
.chart-card { background:var(--branco); border:1px solid var(--borda); border-radius:12px; padding:1.25rem; }
.chart-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.88rem; color:var(--cinza-escuro); margin-bottom:1rem; }

/* Produtos matrix */
.produto-matrix { background:var(--branco); border:1px solid var(--borda); border-radius:12px; overflow:hidden; margin-bottom:1.5rem; }
.pm-header { display:grid; grid-template-columns:220px repeat(4,1fr); background:#F0F2F6; border-bottom:1px solid var(--borda); }
.pm-cell { padding:0.5rem 0.75rem; font-size:0.69rem; font-weight:600; color:var(--cinza); text-transform:uppercase; border-right:1px solid var(--borda); }
.pm-row { display:grid; grid-template-columns:220px repeat(4,1fr); border-bottom:1px solid var(--borda); }
.pm-row:last-child { border-bottom:none; }
.pm-nome { padding:0.6rem 0.75rem; font-size:0.8rem; font-weight:500; color:var(--cinza-escuro); border-right:1px solid var(--borda); }
.pm-val { padding:0.6rem 0.75rem; font-size:0.8rem; text-align:center; border-right:1px solid var(--borda); }
.pm-pct-bar { height:6px; border-radius:3px; background:var(--azul-claro); margin-top:3px; }

/* Aprovação final */
.acoes-table { width:100%; border-collapse:collapse; background:var(--branco); border-radius:12px; overflow:hidden; border:1px solid var(--borda); font-size:0.81rem; }
.acoes-table th { background:#F0F2F6; padding:0.55rem 0.8rem; text-align:left; font-size:0.68rem; font-weight:600; color:var(--cinza); text-transform:uppercase; border-bottom:1px solid var(--borda); }
.acoes-table td { padding:0.65rem 0.8rem; border-bottom:1px solid var(--borda); vertical-align:middle; }
.btn { padding:0.4rem 0.85rem; border-radius:7px; font-size:0.78rem; font-weight:500; cursor:pointer; border:none; }
.btn-approve { background:#E0F5ED; color:#1D7A55; border:1px solid #1D7A5540; }
.btn-outline { background:transparent; border:1.5px solid var(--borda); color:var(--cinza-escuro); }
.empty-state { text-align:center; padding:2.5rem; color:var(--cinza); font-size:0.85rem; background:var(--branco); border:1px solid var(--borda); border-radius:10px; }
.progress-bar { width:65px; height:7px; background:#E5E5E0; border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:4px; }
.progress-fill { height:100%; border-radius:4px; background:var(--azul-medio); }

/* Gantt */
.gantt-wrap { background:var(--branco); border:1px solid var(--borda); border-radius:12px; overflow:auto; }
.gantt-header-row { display:grid; grid-template-columns:220px 80px 1fr; border-bottom:1px solid var(--borda); }
.gantt-col-label { padding:0.5rem 0.6rem; font-size:0.66rem; color:var(--cinza); font-weight:600; text-transform:uppercase; }
.gantt-meses-header { display:grid; grid-template-columns:repeat(12,1fr); }
.gantt-mes { font-size:0.62rem; color:var(--cinza); text-align:center; padding:0.35rem 0; border-left:1px solid var(--borda); }
.gantt-row { display:grid; grid-template-columns:220px 80px 1fr; border-bottom:1px solid var(--borda); align-items:center; }
.gantt-nome { padding:0.35rem 0.6rem; font-size:0.74rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gantt-sub { font-size:0.61rem; color:var(--cinza); }
.gantt-cell-label { padding:0.35rem 0.5rem; font-size:0.66rem; color:var(--cinza); }
.gantt-grid { display:grid; grid-template-columns:repeat(12,1fr); }
.gantt-cell { height:16px; border-left:1px solid var(--borda); }
.gantt-group { background:#F0F2F6; padding:0.4rem 0.6rem; font-size:0.75rem; font-weight:700; border-bottom:1px solid var(--borda); }

footer { padding:0.75rem 2rem; font-size:0.7rem; color:rgba(0,0,0,0.28); text-align:center; border-top:1px solid var(--borda); }
</style>
</head>
<body>
<header>
  <a class="nav-back" href="index.html">← Voltar</a>
  <div class="sep"></div>
  <div class="logo-sigla">SEGAPE</div>
  <div class="sep"></div>
  <div class="logo-nome">Secretaria · Painel executivo — visão completa das entregas</div>
  <div class="header-right">
    <button class="btn-h" onclick="exportarJSON()">Exportar JSON</button>
    <label class="btn-h" style="cursor:pointer">Importar JSON<input type="file" accept=".json" style="display:none" onchange="handleImport(event)"></label>
  </div>
</header>

<main>
  <div class="kpi-grid" id="kpi-cards"></div>

  <div class="tabs">
    <div class="tab active" data-tab="visao" onclick="trocarTab('visao')">Visão geral</div>
    <div class="tab" data-tab="gantt" onclick="trocarTab('gantt')">Gantt completo</div>
    <div class="tab" data-tab="aprovacao" onclick="trocarTab('aprovacao')">Aprovação final</div>
  </div>

  <div id="tab-visao">
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Ações por status</div>
        <canvas id="chart-status" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Horas estimadas por produto</div>
        <canvas id="chart-horas" height="200"></canvas>
      </div>
    </div>
    <div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.9rem;margin-bottom:0.75rem;color:var(--cinza-escuro)">Visão por produto</div>
    <div class="produto-matrix" id="pm-container"></div>
  </div>

  <div id="tab-gantt" style="display:none">
    <div class="gantt-wrap" id="gantt-container"></div>
  </div>

  <div id="tab-aprovacao" style="display:none">
    <div id="aprov-container"></div>
  </div>
</main>

<footer>SEGAPE · Secretaria · v3.0 — <a href="index.html" style="color:inherit">Início</a></footer>

<script src="assets/dados.js"></script>
<script>
let charts = {};

function init() {
  renderKPIs();
  renderVisao();
}

function trocarTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  ['visao','gantt','aprovacao'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=(t===tab)?'block':'none';
  });
  if(tab==='gantt') renderGantt();
  if(tab==='aprovacao') renderAprovacao();
}

function renderKPIs() {
  const r = calcularResumo();
  const data = getData();
  const pendentes = data.acoes.filter(a=>a.aprovacao_dir==='aprovado'&&a.aprovacao_sec==='pendente').length;
  const execBolsistas = EQUIPE.filter(e=>e.nivel==='bolsista');
  const horasBolsistas = data.acoes.reduce((s,a)=>{
    const e = getMembroEquipe(a.executor_id);
    return s + (e?.nivel==='bolsista' ? (a.horas_estimadas||0) : 0);
  },0);

  document.getElementById('kpi-cards').innerHTML = `
    <div class="kpi"><div class="kpi-n">${PRODUTOS_CATALOGO.length}</div><div class="kpi-l">Produtos na Educadados</div></div>
    <div class="kpi"><div class="kpi-n">${r.total_acoes}</div><div class="kpi-l">Ações planejadas</div></div>
    <div class="kpi"><div class="kpi-n">${r.total_horas}h</div><div class="kpi-l">Horas estimadas total</div></div>
    <div class="kpi"><div class="kpi-n">${horasBolsistas}h</div><div class="kpi-l">Horas bolsistas</div></div>
    <div class="kpi"><div class="kpi-n">${r.concluidas}</div><div class="kpi-l">Ações concluídas</div></div>
    <div class="kpi"><div class="kpi-n">${r.media_percentual}%</div><div class="kpi-l">Avanço médio geral</div></div>
    <div class="kpi ${pendentes>0?'alert':''}"><div class="kpi-n">${pendentes}</div><div class="kpi-l">Aguardam aprovação sec.</div></div>
  `;
}

function renderVisao() {
  const data = getData();

  // Chart status
  const statusCount = {};
  Object.keys(STATUS_LABELS).forEach(k=>{statusCount[k]=0;});
  data.acoes.forEach(a=>{statusCount[a.status]=(statusCount[a.status]||0)+1;});
  const statusLabels = Object.keys(statusCount).filter(k=>statusCount[k]>0);

  if(charts.status) charts.status.destroy();
  charts.status = new Chart(document.getElementById('chart-status'), {
    type:'doughnut',
    data:{
      labels: statusLabels.map(k=>STATUS_LABELS[k]?.label||k),
      datasets:[{ data: statusLabels.map(k=>statusCount[k]),
        backgroundColor: statusLabels.map(k=>STATUS_LABELS[k]?.cor||'#888'), borderWidth:2, borderColor:'white' }]
    },
    options:{ plugins:{ legend:{position:'right',labels:{font:{size:11},boxWidth:12}}}, cutout:'65%' }
  });

  // Chart horas por produto
  const prodComHoras = PRODUTOS_CATALOGO.map(p => ({
    nome: p.nome.split(' ').slice(0,3).join(' '),
    horas: data.acoes.filter(a=>a.produto_id===p.id).reduce((s,a)=>s+(a.horas_estimadas||0),0)
  })).filter(p=>p.horas>0).sort((a,b)=>b.horas-a.horas);

  if(charts.horas) charts.horas.destroy();
  charts.horas = new Chart(document.getElementById('chart-horas'), {
    type:'bar',
    data:{
      labels: prodComHoras.map(p=>p.nome),
      datasets:[{ data: prodComHoras.map(p=>p.horas),
        backgroundColor: '#2E5CA820', borderColor:'#2E5CA8', borderWidth:1.5, borderRadius:4 }]
    },
    options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true,grid:{color:'#eee'}},x:{grid:{display:false}}} }
  });

  // Matriz de produtos
  let pmHtml = `<div class="pm-header">
    <div class="pm-cell">Produto</div>
    <div class="pm-cell">Ações</div>
    <div class="pm-cell">Horas</div>
    <div class="pm-cell">Avanço</div>
    <div class="pm-cell">Tipo</div>
  </div>`;

  PRODUTOS_CATALOGO.forEach(p => {
    const acoes = data.acoes.filter(a=>a.produto_id===p.id);
    const horas = acoes.reduce((s,a)=>s+(a.horas_estimadas||0),0);
    const pct = acoes.length?Math.round(acoes.reduce((s,a)=>s+(a.percentual||0),0)/acoes.length):0;
    const gerente = getMembroEquipe(p.gerente_id);
    const tipo = TIPOS_PRODUTO[p.tipo]||{cor:'#888'};
    pmHtml += `<div class="pm-row">
      <div class="pm-nome">
        <div style="font-weight:600">${p.nome}</div>
        <div style="font-size:0.7rem;color:var(--cinza)">${gerente?.nome.split(' ').slice(0,2).join(' ')||'—'} · ${getSiglaCoordenacao(p.coordenacao_id)}</div>
      </div>
      <div class="pm-val">${acoes.length}</div>
      <div class="pm-val" style="font-weight:600;color:var(--azul)">${horas}h</div>
      <div class="pm-val">
        <div>${pct}%</div>
        <div class="pm-pct-bar" style="width:${pct}%"></div>
      </div>
      <div class="pm-val">${tipoProdutoBadgeHTML(p.tipo)}</div>
    </div>`;
  });

  document.getElementById('pm-container').innerHTML = pmHtml;
}

function renderGantt() {
  const data = getData();
  const mesAtual = new Date().getMonth()+1;

  let html = `<div class="gantt-header-row">
    <div class="gantt-col-label">Ação</div>
    <div class="gantt-col-label">Gerente/Horas</div>
    <div class="gantt-meses-header">${MESES.map(m=>`<div class="gantt-mes">${m}</div>`).join('')}</div>
  </div>`;

  PRODUTOS_CATALOGO.forEach(p => {
    const acoes = data.acoes.filter(a=>a.produto_id===p.id);
    if(!acoes.length) return;
    const tipo = TIPOS_PRODUTO[p.tipo]||{cor:'#888'};
    html += `<div class="gantt-group" style="color:${tipo.cor}">${p.nome}</div>`;
    acoes.forEach(a=>{
      const g=getMembroEquipe(a.gerente_id);
      const cor=FASES[a.fase]?.cor||'#888';
      const cells=MESES.map((_,i)=>{
        const mes=i+1,ativo=mes>=a.mes_inicio&&mes<=a.mes_fim;
        return `<div class="gantt-cell ${ativo?'ativo':''}" style="${ativo?`background:${cor}`:''};${mes===mesAtual?'box-shadow:inset 0 0 0 1px #C8922A':''}"></div>`;
      }).join('');
      html+=`<div class="gantt-row">
        <div class="gantt-nome">${a.titulo}<div class="gantt-sub">${COMPLEXIDADE[a.complexidade]?.label||''} · ${faseBadgeHTML(a.fase)}</div></div>
        <div class="gantt-cell-label">${g?.nome.split(' ')[0]||'—'}<br><span style="font-weight:700;color:var(--azul)">${a.horas_estimadas||0}h</span></div>
        <div class="gantt-grid">${cells}</div>
      </div>`;
    });
  });

  document.getElementById('gantt-container').innerHTML = html || '<div style="padding:2rem;text-align:center;color:var(--cinza)">Nenhuma ação cadastrada</div>';
}

function renderAprovacao() {
  const pendentes = getData().acoes.filter(a=>a.aprovacao_dir==='aprovado'&&a.aprovacao_sec==='pendente');
  if(!pendentes.length){
    document.getElementById('aprov-container').innerHTML='<div class="empty-state">Nenhuma ação aguardando aprovação da secretaria ✓</div>';
    return;
  }
  let html = `<div style="margin-bottom:0.5rem;font-size:0.82rem;color:var(--cinza)">${pendentes.length} ação(ões) aprovadas pela diretoria aguardando aprovação do secretário</div>
  <table class="acoes-table">
    <thead><tr><th>Ação</th><th>Produto</th><th>Gerente</th><th>Executor</th><th>Horas</th><th>Cx</th><th>Período</th><th>Aprovação</th></tr></thead>
    <tbody>
    ${pendentes.map(a=>{
      const p=getProduto(a.produto_id),g=getMembroEquipe(a.gerente_id),ex=a.executor_id?getMembroEquipe(a.executor_id):null;
      return `<tr>
        <td style="font-weight:500">${a.titulo}</td>
        <td style="font-size:0.77rem">${p?.nome||'—'}</td>
        <td style="font-size:0.77rem">${g?.nome.split(' ')[0]||'—'}</td>
        <td style="font-size:0.77rem">${ex?ex.nome.split(' ').slice(0,2).join(' '):'—'}</td>
        <td style="font-weight:600;color:var(--azul)">${a.horas_estimadas||0}h</td>
        <td>${complexidadeBadgeHTML(a.complexidade)}</td>
        <td style="font-size:0.77rem;white-space:nowrap">${mesToNome(a.mes_inicio)}→${mesToNome(a.mes_fim)}</td>
        <td><button class="btn btn-approve" onclick="aprovarSec('${a.id}')">✓ Aprovar</button></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
  document.getElementById('aprov-container').innerHTML = html;
}

function aprovarSec(id) {
  atualizarAcao(id, { aprovacao_sec: 'aprovado' });
  renderKPIs();
  renderAprovacao();
}

function handleImport(e) {
  const file = e.target.files[0];
  if(!file) return;
  importarJSON(file, (err) => {
    if(err) { alert('Erro ao importar: '+err); return; }
    init();
    alert('Dados importados com sucesso.');
  });
}

init();
</script>
</body>
</html>
